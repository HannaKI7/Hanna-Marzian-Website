<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSINESS.EINFACH.SMART – Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,400;1,500;1,600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>

/* ── Tokens ── */
:root {
  --orange:       #D8622A;
  --orange-deep:  #B24E1E;
  --ink:          #160C05;
  --ink-soft:     #3C2516;
  --cream:        #FBF7F2;
  --muted:        #8E8076;
  --handle:       #5C4430;
  --line:         rgba(22,12,5,0.14);
  --bg:           var(--cream);
}

[data-theme="dark"] {
  --ink:      #FBF7F2;
  --ink-soft: rgba(251,247,242,0.72);
  --cream:    #160C05;
  --muted:    rgba(251,247,242,0.44);
  --handle:   #D0B896;
  --line:     rgba(251,247,242,0.12);
  --bg:       #160C05;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
}

body {
  display: grid;
  place-items: center;
  min-height: 100dvh;
  background: var(--bg);
  font-family: 'Montserrat', sans-serif;
  transition: background 0.35s ease, color 0.35s ease;
  overflow: hidden;
}

/* ── Noise texture ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  mix-blend-mode: multiply;
}

/* ── Theme toggle ── */
.toggle {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  width: 44px;
  height: 44px;
  border: 1.5px solid var(--line);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: border-color 0.25s, transform 0.25s;
  z-index: 10;
}
.toggle:hover { border-color: var(--orange); transform: rotate(15deg); }
.toggle svg { width: 18px; height: 18px; fill: var(--ink); transition: fill 0.25s; }

/* ── Logo container ── */
.logo {
  text-align: center;
  padding: 2rem;
  user-select: none;
}

/* ── Brand line ── */
.brand {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(1.4rem, 3.2vw, 3.2rem);
  letter-spacing: 0.16em;
  line-height: 1;
  color: var(--ink);
  transition: color 0.35s;
  white-space: nowrap;
}
.brand .dot {
  color: var(--orange);
  display: inline-block;
  animation: pulse-dot 4s ease-in-out infinite;
}
.brand .dot:nth-child(2) { animation-delay: 1.3s; }
.brand .dot:nth-child(3) { animation-delay: 2.6s; }

@keyframes pulse-dot {
  0%, 80%, 100% { opacity: 1; transform: scale(1); }
  40%           { opacity: 0.6; transform: scale(0.85); }
}

/* ── Divider ── */
.divider {
  width: clamp(60px, 10vw, 120px);
  height: 1.5px;
  margin: clamp(1.2rem, 3vw, 2rem) auto;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  opacity: 0.7;
}

/* ── JV names row ── */
.jv {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(1rem, 3vw, 3rem);
}

.person {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35em;
}

.name {
  font-family: 'Cormorant', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.5rem, 3.5vw, 4rem);
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.01em;
  transition: color 0.35s;
}

.handle {
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: clamp(0.6rem, 1.1vw, 1rem);
  letter-spacing: 0.1em;
  color: var(--handle);
  transition: color 0.35s;
}

/* ── Vertical divider between handles ── */
.jv-divider {
  width: 1.5px;
  height: 1.2rem;
  background: linear-gradient(to bottom, transparent, var(--orange) 20%, var(--orange) 80%, transparent);
  flex-shrink: 0;
}

/* ── Tagline ── */
.tagline {
  margin-top: clamp(1.5rem, 4vw, 3rem);
  font-family: 'Cormorant', Georgia, serif;
  font-style: italic;
  font-size: clamp(0.85rem, 1.5vw, 1.4rem);
  color: var(--muted);
  letter-spacing: 0.04em;
  transition: color 0.35s;
}

/* ── Subtle ambient glow behind logo ── */
.logo::before {
  content: '';
  position: absolute;
  width: 600px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(216,98,42,0.08) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.logo { position: relative; }

/* ── Responsive tweak for very small screens ── */
@media (max-width: 480px) {
  .jv { gap: 0.8rem; }
  .jv-divider { height: 2.5rem; }
}

@media (prefers-reduced-motion: reduce) {
  .brand .dot { animation: none; }
}

</style>
</head>
<body>

<!-- Theme toggle -->
<button class="toggle" onclick="toggleTheme()" title="Dark/Light umschalten" aria-label="Theme wechseln">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path id="toggleIcon" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
  </svg>
</button>

<!-- Logo -->
<div class="logo">

  <div class="brand">
    BUSINESS<span class="dot">.</span>EINFACH<span class="dot">.</span>SMART<span class="dot">.</span>
  </div>


</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');

  const icon = document.getElementById('toggleIcon');
  if (isDark) {
    icon.setAttribute('d', 'M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z');
  } else {
    icon.setAttribute('d', 'M12 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 15a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm8.66-13.07a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zM5.64 18.36a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zM21 11a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2h1zM4 11a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2h1zm14.36-5.64a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71zm-12.73 0 .71.71A1 1 0 0 1 4.93 7.48l-.71-.71a1 1 0 0 1 1.41-1.41z');
  }
}
</script>
</body>
</html>
