<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="aiGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#9333EA" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a1a28" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="800" fill="#1a1a2e"/>
  <rect width="1400" height="800" fill="url(#grid)"/>

  <!-- CONNECTION LINES -->
  <g fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M 280 350 L 380 350"/>
    <path d="M 580 350 L 680 350"/>
    <!-- Branch to 3 outputs -->
    <path d="M 780 350 L 850 350 L 850 200 L 950 200"/>
    <path d="M 850 350 L 950 350"/>
    <path d="M 850 350 L 850 500 L 950 500"/>
  </g>

  <g fill="#4F46E5">
    <circle cx="280" cy="350" r="8"/>
    <circle cx="380" cy="350" r="8"/>
    <circle cx="580" cy="350" r="8"/>
    <circle cx="680" cy="350" r="8"/>
    <circle cx="780" cy="350" r="8"/>
    <circle cx="850" cy="200" r="6"/>
    <circle cx="850" cy="350" r="6"/>
    <circle cx="850" cy="500" r="6"/>
    <circle cx="950" cy="200" r="6"/>
    <circle cx="950" cy="350" r="6"/>
    <circle cx="950" cy="500" r="6"/>
  </g>

  <!-- NODE 1: Zoom Trigger -->
  <g transform="translate(80, 270)" filter="url(#nodeShadow)">
    <rect width="200" height="160" rx="16" fill="#262640"/>
    <rect width="200" height="56" rx="16" fill="#2D8CFF"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📹</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Zoom</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Call beendet</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93C5FD">Webhook</text>
  </g>

  <!-- NODE 2: Transkript -->
  <g transform="translate(380, 270)" filter="url(#nodeShadow)">
    <rect width="200" height="160" rx="16" fill="#262640"/>
    <rect width="200" height="56" rx="16" fill="#2D8CFF"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📝</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Transkript</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">abrufen</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#93C5FD">Zoom API</text>
  </g>

  <!-- NODE 3: KI Extract (with glow) -->
  <g transform="translate(580, 270)" filter="url(#aiGlow)">
    <rect width="200" height="160" rx="16" fill="#262640" filter="url(#nodeShadow)"/>
    <rect width="200" height="56" rx="16" fill="url(#aiGrad)"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">🤖</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">KI-Extraktion</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Kundeninfos</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#C4B5FD">Strukturieren</text>
  </g>

  <!-- NODE 4a: Notion -->
  <g transform="translate(950, 120)" filter="url(#nodeShadow)">
    <rect width="180" height="160" rx="16" fill="#262640"/>
    <rect width="180" height="56" rx="16" fill="#000"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">📓</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Notion</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Projekt anlegen</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">Workspace</text>
  </g>

  <!-- NODE 4b: KI Solutions (with glow) -->
  <g transform="translate(950, 270)" filter="url(#aiGlow)">
    <rect width="180" height="160" rx="16" fill="#262640" filter="url(#nodeShadow)"/>
    <rect width="180" height="56" rx="16" fill="url(#aiGrad)"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">💡</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">KI-Lösungen</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Vorschläge</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#C4B5FD">Generieren</text>
  </g>

  <!-- NODE 4c: Email -->
  <g transform="translate(950, 420)" filter="url(#nodeShadow)">
    <rect width="180" height="160" rx="16" fill="#262640"/>
    <rect width="180" height="56" rx="16" fill="#EA4335"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">📧</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Email</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Willkommen</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#FCA5A5">+ Summary</text>
  </g>

  <!-- Sticky Note -->
  <g transform="translate(80, 550)">
    <rect width="280" height="140" rx="12" fill="#FEF3C7" filter="url(#nodeShadow)"/>
    <rect width="280" height="16" rx="12" fill="#F59E0B"/>
    <text x="24" y="55" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#92400E">Onboarding</text>
    <text x="24" y="85" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#92400E">Agent</text>
    <text x="24" y="120" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#B45309">Call → Alles automatisch</text>
  </g>

  <!-- Results Badge -->
  <g transform="translate(1150, 550)">
    <rect width="160" height="100" rx="16" fill="rgba(16, 185, 129, 0.15)" stroke="#10B981" stroke-width="3"/>
    <text x="80" y="45" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#10B981">-45 Min</text>
    <text x="80" y="75" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6EE7B7">pro Kunde</text>
  </g>

</svg>
