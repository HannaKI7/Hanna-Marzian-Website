<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="aiGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#9333EA" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a1a28" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="800" fill="#1a1a2e"/>
  <rect width="1400" height="800" fill="url(#grid)"/>

  <!-- CONNECTION LINES - 3 inputs merge -->
  <g fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M 260 180 L 350 180 L 350 400 L 450 400"/>
    <path d="M 260 400 L 450 400"/>
    <path d="M 260 620 L 350 620 L 350 400 L 450 400"/>
    <!-- Continue flow -->
    <path d="M 630 400 L 730 400"/>
    <path d="M 910 400 L 1010 400"/>
    <!-- Branch to 2 outputs -->
    <path d="M 1100 400 L 1150 400 L 1150 280 L 1200 280"/>
    <path d="M 1150 400 L 1150 520 L 1200 520"/>
  </g>

  <g fill="#4F46E5">
    <circle cx="260" cy="180" r="8"/>
    <circle cx="260" cy="400" r="8"/>
    <circle cx="260" cy="620" r="8"/>
    <circle cx="350" cy="400" r="6"/>
    <circle cx="450" cy="400" r="8"/>
    <circle cx="630" cy="400" r="8"/>
    <circle cx="730" cy="400" r="8"/>
    <circle cx="910" cy="400" r="8"/>
    <circle cx="1010" cy="400" r="8"/>
    <circle cx="1100" cy="400" r="8"/>
    <circle cx="1150" cy="280" r="6"/>
    <circle cx="1150" cy="520" r="6"/>
    <circle cx="1200" cy="280" r="6"/>
    <circle cx="1200" cy="520" r="6"/>
  </g>

  <!-- INPUT NODE 1: Instagram -->
  <g transform="translate(60, 100)" filter="url(#nodeShadow)">
    <rect width="200" height="160" rx="16" fill="#262640"/>
    <rect width="200" height="56" rx="16" fill="#E1306C"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📱</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Instagram</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">DM Trigger</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#F9A8D4">Neue Leads</text>
  </g>

  <!-- INPUT NODE 2: Email -->
  <g transform="translate(60, 320)" filter="url(#nodeShadow)">
    <rect width="200" height="160" rx="16" fill="#262640"/>
    <rect width="200" height="56" rx="16" fill="#EA4335"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📧</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Email</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Trigger</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#FCA5A5">Anfragen</text>
  </g>

  <!-- INPUT NODE 3: LinkedIn -->
  <g transform="translate(60, 540)" filter="url(#nodeShadow)">
    <rect width="200" height="160" rx="16" fill="#262640"/>
    <rect width="200" height="56" rx="16" fill="#0A66C2"/>
    <rect y="44" width="200" height="12" fill="#262640"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">💼</text>
    <text x="100" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">LinkedIn</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Trigger</text>
    <text x="100" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#7DD3FC">Connections</text>
  </g>

  <!-- NODE: Merge -->
  <g transform="translate(450, 320)" filter="url(#nodeShadow)">
    <rect width="180" height="160" rx="16" fill="#262640"/>
    <rect width="180" height="56" rx="16" fill="#6366F1"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">🔀</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Merge</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Zusammenführen</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#A5B4FC">Alle Kanäle</text>
  </g>

  <!-- NODE: Normalize -->
  <g transform="translate(730, 320)" filter="url(#nodeShadow)">
    <rect width="180" height="160" rx="16" fill="#262640"/>
    <rect width="180" height="56" rx="16" fill="#22C55E"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">📋</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Normalisieren</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Format</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4ADE80">Einheitlich</text>
  </g>

  <!-- NODE: CRM Lookup (with glow) -->
  <g transform="translate(1010, 320)" filter="url(#aiGlow)">
    <rect width="180" height="160" rx="16" fill="#262640" filter="url(#nodeShadow)"/>
    <rect width="180" height="56" rx="16" fill="url(#aiGrad)"/>
    <rect y="44" width="180" height="12" fill="#262640"/>
    <text x="90" y="38" text-anchor="middle" font-size="28">🔍</text>
    <text x="90" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">CRM Lookup</text>
    <text x="90" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Existiert?</text>
    <text x="90" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#C4B5FD">GoHighLevel</text>
  </g>

  <!-- OUTPUT NODE 1: Create New -->
  <g transform="translate(1200, 200)" filter="url(#nodeShadow)">
    <rect width="140" height="160" rx="16" fill="#262640"/>
    <rect width="140" height="56" rx="16" fill="#22C55E"/>
    <rect y="44" width="140" height="12" fill="#262640"/>
    <text x="70" y="38" text-anchor="middle" font-size="24">➕</text>
    <text x="70" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff">Neu</text>
    <text x="70" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af">anlegen</text>
    <text x="70" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ADE80">+ Tags</text>
  </g>

  <!-- OUTPUT NODE 2: Update -->
  <g transform="translate(1200, 440)" filter="url(#nodeShadow)">
    <rect width="140" height="160" rx="16" fill="#262640"/>
    <rect width="140" height="56" rx="16" fill="#FBBF24"/>
    <rect y="44" width="140" height="12" fill="#262640"/>
    <text x="70" y="38" text-anchor="middle" font-size="24">🔄</text>
    <text x="70" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Update</text>
    <text x="70" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4a4a6a">Returning</text>
    <text x="70" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#92400E">EXISTS</text>
  </g>

  <!-- Sticky Note -->
  <g transform="translate(450, 550)">
    <rect width="240" height="120" rx="12" fill="#FEF3C7" filter="url(#nodeShadow)"/>
    <rect width="240" height="16" rx="12" fill="#F59E0B"/>
    <text x="24" y="50" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#92400E">CRM Sync</text>
    <text x="24" y="80" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#B45309">Alle Kanäle →</text>
    <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#B45309">Ein zentrales CRM</text>
  </g>

</svg>
